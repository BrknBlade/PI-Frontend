<section class="contenedor">
    <h1>Ajustes</h1>
    <p>Gestiona la configuración de tu tienda y tus preferencias.</p>

    <article class="card">
        <header class="card-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail w-5 h-5 text-primary"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
            <h2>Datos de la tienda</h2>
        </header>
        <div class="card-options">
            <label>
                Nombre de la tienda
                <input type="text" placeholder="Escribe el nombre de tu tienda">
            </label>
            <label>
                Email
                <input type="text" placeholder="Escribe el email de tu tienda">
            </label>
            <label>
                Teléfono
                <input type="text" placeholder="Escribe el número telefónico de tu tienda">
            </label>
            <label>
                Dirección
                <input type="text" placeholder="Escribe la dirección de tu tienda">
            </label>
        </div>
        <button class="card-button">Guardar</button>
    </article>
</section>
