<section class="contenedor">
    <h1>Ajustes</h1>
    <p>Gestiona la configuración de tu tienda y tus preferencias.</p>

    <article class="card">
        <header class="card-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail w-5 h-5 text-primary"><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>
            <h2>Datos de la tienda</h2>
        </header>
        <div class="card-options">
            <label class="campos">
                Nombre de la tienda
                <input type="text" placeholder="Escribe el nombre de tu tienda">
            </label>
            <label class="campos">
                Email
                <input type="text" placeholder="Escribe el email de tu tienda">
            </label>
            <label class="campos">
                Teléfono
                <input type="text" placeholder="Escribe el número telefónico de tu tienda">
            </label>
            <label class="campos">
                Dirección
                <input type="text" placeholder="Escribe la dirección de tu tienda">
            </label>
        </div>
        <button class="card-button">Guardar Información</button>
    </article>

    <article class="card">
        <header class="card-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock w-5 h-5 text-primary"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <h2>Horario Laboral</h2>
        </header>
        <div class="card-options">
            <div class="row campos">
                <div class="toogle">
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider round"></span>
                    </label>
                </div>
                <span>Lunes</span>
                <input class="inicioDia" type="text" value="09:00">
                <span>/</span>
                <input class="finDia" type="text" value="17:00">
            </div>
        </div>
        <button class="card-button">Guardar Información</button>
    </article>
</section>
